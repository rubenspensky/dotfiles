# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################



# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = wofi


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = vi waybar & hyprpaper & firefox
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = mako
exec-once = swww-daemon
exec-once = swww img /home/dragon/.dotfiles/hypr/wallpapers/akira.png --transition-type any --transition-duration 1
exec-once = google-chrome-stable --app=https://music.youtube.com/


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct:qt6ct
env = QT_STYLE_OVERRIDE,kvantum


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow



#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 10

    border_size = 2

    # Night E-Ink borders (subtle, modern)
    col.active_border = rgba(C6B089CC)  # sepia tenue (activo)
    col.inactive_border = rgba(1A1F24CC) # casi negro (inactivo)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2

    # Sin brillo excesivo; claridad pero suave
    active_opacity = 1.0
    inactive_opacity = 0.97

    shadow {
        enabled = true
        range = 18
        render_power = 2
        color = rgba(00000066)
    }

    # E-Ink = mate: blur muy leve o apagado
    blur {
        enabled = false
        size = 2
        passes = 1
        vibrancy = 0.0
    }
}

animations {
    enabled = true

    # Curvas más discretas
    bezier = smooth, 0.22, 1, 0.36, 1
    bezier = quick,  0.2,  0, 0.1,  1
    bezier = linear, 0,    0, 1,    1

    # Menos "bouncy", más sobrio
    animation = global,        1,  7,  smooth
    animation = border,        1,  6,  smooth
    animation = windows,       1,  6,  smooth
    animation = windowsIn,     1,  6,  smooth
    animation = windowsOut,    1,  5,  smooth
    animation = fade,          1,  5,  quick
    animation = layers,        1,  6,  smooth
    animation = workspaces,    1,  5,  quick
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = ALT # Sets "ALT" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more s
#bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
#bind = $mainMod, V, togglefloating,
#bind = $mainMod, R, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, ESCAPE, exec, /home/dragon/.dotfiles/scripts/lock-session.sh
bind = $mainMod, P, exec, /home/dragon/.dotfiles/scripts/power-menu.sh

# =========================
# Zellij-like navigation ($mainMod)
# =========================

# Focus con $mainMod + hjkl
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Workspace anterior/siguiente con $mainMod+Shift+h/l
bind = $mainMod SHIFT, h, workspace, e-1
bind = $mainMod SHIFT, l, workspace, e+1

# Ir a workspace específico con $mainMod + número
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

#Mover ventana  a workspace específico con $mainMod + shift + número

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Mueve la ventana a un workspace vacio
bind = $mainMod SHIFT, N, movetoworkspace, empty



# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with $mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media controls with $mainMod + Ctrl + Vim keys
bind = $mainMod CTRL, j, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mainMod CTRL, k, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod CTRL, h, exec, playerctl previous
bind = $mainMod CTRL, l, exec, playerctl next
bind = $mainMod CTRL, RETURN, exec, playerctl play-pause
bind = $mainMod, M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ===== Screenshots =====
# $mainMod + s -> seleccionar región y copiar al portapapeles
bind = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Región copiada al portapapeles"

# $mainMod + Shift + s -> seleccionar región y guardar archivo
bind = $mainMod SHIFT, S, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Screenshot" "Región guardada en ~/Pictures/Screenshots"

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# WORKSPACES

workspace = 5, monitor:DVI-I-2

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Fallback: si no hay monitores externos, usa la pantalla de la laptop
monitor = eDP-1,preferred,auto,1

# Desactivar monitor virtual (suele ser innecesario y estorba)
monitor = WAYLAND-1,disable

# Monitor principal (HP 25x) - centro
monitor = DVI-I-2,1920x1080@144,0x0,1

# Monitor vertical (MSI MP251) - derecha
monitor = DVI-I-1,1920x1080@60,1920x0,1,transform,3
