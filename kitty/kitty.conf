
# Kitty — Night E-Ink (High Legibility)

font_family JetBrainsMono Nerd Font
font_size 12.0
enable_audio_bell no
confirm_os_window_close 0

# Más contraste sin perder el look
background_opacity 0.95
dynamic_background_opacity no

# Base
background            #070809
foreground            #F3EEE6

# Selection (más visible)
selection_background  #1A2330
selection_foreground  #F3EEE6

# Cursor
cursor                #F3EEE6
cursor_text_color     #070809

# Tabs / UI
active_tab_background   #0C0F12
active_tab_foreground   #F3EEE6
inactive_tab_background #070809
inactive_tab_foreground #C6BFB6

# Borders (acento sepia)
active_border_color   #C6B089
inactive_border_color #1A1F24

# 16-color palette (muted, readable)
color0  #070809
color1  #B07A6A
color2  #8FAE9B
color3  #C6B089
color4  #87AFC7
color5  #A6A3D8
color6  #8AA6A6
color7  #EEE8DF

# Bright colors (importante para "suggested/ghost text")
color8  #49545E
color9  #C08A7A
color10 #9CBBA8
color11 #D7C29A
color12 #9BBFD6
color13 #B4B1E5
color14 #9DB7B7
color15 #FAF4EC

# Espaciado
window_padding_width 10

